<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Caritas Doctor OnCall Portal">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="oncall_doctor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Caritas Doctor OnCall</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      inset: 0; overflow: hidden; 
      margin: 0; padding: 0; 
      position: fixed; 
      user-select: none; 
      touch-action: none; 
      -webkit-user-select: none; 
      -webkit-touch-callout: none; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      transition: opacity 0.5s ease-out;
    }
    .logo-container {
      margin-bottom: 40px;
      animation: fadeInScale 0.8s ease-out;
    }
    .logo {
      width: 180px;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
    }
    .loader-wrapper {
      width: 240px;
      height: 4px;
      background-color: #f0f2f5;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #1e3a8a, #3b82f6);
      transform-origin: 0% 50%;
      animation: indeterminate 1.8s infinite cubic-bezier(0.65, 0.815, 0.735, 0.395);
    }
    @keyframes indeterminate {
      0% { transform: translateX(-100%) scaleX(0.2); }
      50% { transform: translateX(0%) scaleX(0.5); }
      100% { transform: translateX(100%) scaleX(0.2); }
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="logo-container">
      <img class="logo" src="logo.webp" alt="Loading Logo" />
    </div>
    <div class="loader-wrapper">
      <div class="progress-bar"></div>
    </div>
  </div>
  <script>
    // Smoothly remove the loading screen once Flutter is ready
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        if (mutation.addedNodes) {
          for (const node of mutation.addedNodes) {
            if (node.tagName === 'FLT-GLASS-PANE') {
              const loader = document.getElementById('loading-screen');
              if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
              }
              observer.disconnect();
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
